{{ define "main" }}
<h1>{{ .Title }}</h1>

{{ if .Content }}
<div class="content">
    {{ .Content }}
</div>
{{ end }}

<div class="post-list">
    {{ range .Pages }}
    <article class="post-item">
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        <div class="date">{{ .Date.Format "January 2, 2006" }}</div>
        <p>{{ .Summary }}</p>
    </article>
    {{ end }}
</div>
{{ end }}
